project: "phog-net"
seed: 42
device: "cuda"   # "cpu" or "cuda"
dataset: "pathmnist"
data_root: "./data"
run_dir: "./runs"
n_channel: 3
img_size: 32
batch_size: 128

model:
  bins: 20
  levels: 1
  num_blocks: [2, 2, 2, 2]
  ablation_case: null

train:
  epochs: 10
  lr: 0.001
  weight_decay: 0.0001
  optimizer: "Adam"
  momentum: 0.9
  patience: 10
  accumulation_steps: 4
  milestones: [50, 75]
  gamma: 0.1
