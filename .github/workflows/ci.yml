name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (CPU-only torch + CI tools)
        run: |
          python -m pip install --upgrade pip

          # CPU-only PyTorch (avoids huge CUDA nvidia-* deps)
          pip install --no-cache-dir --index-url https://download.pytorch.org/whl/cpu torch torchvision

          # Install project without deps (prevents reinstalling torch)
          pip install --no-cache-dir -e . --no-deps

          # Runtime deps
          pip install --no-cache-dir numpy pyyaml tqdm pillow medmnist scikit-learn matplotlib

          # CI tools
          pip install --no-cache-dir ruff pytest pytest-cov

      - name: Lint + Format Check
        run: |
          ruff check .
          ruff format --check .

      - name: Tests
        run: |
          pytest -q
