name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (CPU-only torch to avoid disk full)
        run: |
          python -m pip install --upgrade pip

          # Install CPU-only PyTorch + torchvision (avoids massive CUDA nvidia-* deps)
          pip install --no-cache-dir --index-url https://download.pytorch.org/whl/cpu torch torchvision

          # Install this repo without pulling deps again (prevents CUDA torch reinstall)
          pip install --no-cache-dir -e ".[dev]" --no-deps

          # Install remaining runtime deps
          pip install --no-cache-dir numpy pyyaml tqdm pillow medmnist scikit-learn matplotlib

      - name: Lint + Format Check
        run: |
          ruff check .
          ruff format --check .

      - name: Tests
        run: |
          pytest -q
